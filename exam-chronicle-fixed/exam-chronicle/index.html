<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
  <meta name="description" content="GCSE &amp; A Level past-paper tracker — Prepare. Practice. Succeed." />

  <!-- PWA / iOS -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0D1B2E" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#060E1A" media="(prefers-color-scheme: dark)" />

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ExamChron" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-180.png" />

  <!-- Splash screens — iPhone 14 Pro / 15 Pro -->
  <meta name="apple-touch-startup-image" content="/icons/icon-512.png" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <!-- Open Graph -->
  <meta property="og:title" content="Exam Chronicle" />
  <meta property="og:description" content="GCSE &amp; A Level past-paper tracker. Prepare. Practice. Succeed." />
  <meta property="og:image" content="/icons/icon-512.png" />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet" />

  <title>Exam Chronicle · Past-Paper Tracker</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: 100%;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }
    body {
      min-height: 100vh;
      min-height: -webkit-fill-available;
      margin: 0; padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      overscroll-behavior: none;
      font-family: "Montserrat", system-ui, -apple-system, sans-serif;
      /* Prevent text selection on long-press */
      -webkit-user-select: none;
      user-select: none;
    }
    /* Re-allow text selection in content areas */
    p, h1, h2, h3, span, td, th, li, input, textarea { -webkit-user-select: text; user-select: text; }
    #root { min-height: 100vh; min-height: -webkit-fill-available; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* iOS input zoom fix */
    input, select, textarea { font-size: 16px !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Register service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(err => console.warn("SW:", err));
      });
    }
  </script>
</body>
</html>
